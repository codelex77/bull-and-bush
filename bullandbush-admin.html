<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bull & Bush | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --black:#0d0d0b; --dark:#141410; --charcoal:#1c1c18; --iron:#2a2a24;
            --mid:#5a5a50; --muted:#8a8a7a; --light:#c8c8b8; --cream:#f4f0e8;
            --green:#2d5a27; --green-lt:#3d7a35; --tan:#c8944a; --tan-lt:#d4a86a;
            --red:#8b2020;
            --font-display:'Playfair Display',serif;
            --font-body:'DM Sans',sans-serif;
            --font-mono:'DM Mono',monospace;
            --transition:0.25s ease;
        }
        html,body { height:100%; }
        body { background:var(--dark); color:var(--cream); font-family:var(--font-body); font-size:15px; }

        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

        /* LOGIN */
        #loginScreen { position:fixed; inset:0; background:var(--black); display:flex; align-items:center; justify-content:center; z-index:9999; }
        .login-card { background:var(--charcoal); border:1px solid var(--iron); border-radius:2px; padding:48px 40px; width:100%; max-width:380px; position:relative; }
        .login-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--green),var(--tan)); }
        .login-logo { font-family:var(--font-display); font-size:22px; font-weight:900; letter-spacing:3px; color:var(--cream); margin-bottom:28px; }
        .login-logo span { color:var(--tan); }
        .login-card h2 { font-family:var(--font-display); font-size:26px; font-weight:700; margin-bottom:6px; }
        .login-card > p { font-size:13px; color:var(--muted); margin-bottom:28px; }
        .login-field { display:flex; flex-direction:column; gap:7px; margin-bottom:16px; }
        .login-field label { font-family:var(--font-mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
        .login-field input { background:var(--iron); border:1px solid rgba(255,255,255,0.08); border-radius:2px; color:var(--cream); padding:13px 16px; font-family:var(--font-body); font-size:14px; transition:border-color var(--transition); }
        .login-field input:focus { outline:none; border-color:var(--tan); }
        .login-btn { width:100%; background:var(--tan); color:var(--black); border:none; border-radius:2px; padding:15px; font-family:var(--font-mono); font-size:11px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; margin-top:8px; transition:background var(--transition); font-weight:600; }
        .login-btn:hover { background:var(--tan-lt); }
        .login-error { background:rgba(139,32,32,0.15); border:1px solid rgba(139,32,32,0.3); color:#e05252; border-radius:2px; padding:10px 14px; font-size:13px; margin-top:12px; display:none; }

        /* DASHBOARD */
        #dashboard { display:none; min-height:100vh; animation:fadeIn 0.4s ease; }

        .sidebar { position:fixed; top:0; left:0; bottom:0; width:220px; background:var(--black); border-right:1px solid var(--iron); display:flex; flex-direction:column; z-index:100; }
        .sidebar-logo { padding:24px 20px; border-bottom:1px solid var(--iron); }
        .sidebar-logo-main { font-family:var(--font-display); font-size:16px; font-weight:900; letter-spacing:2px; color:var(--cream); }
        .sidebar-logo-main span { color:var(--tan); }
        .sidebar-logo-sub { font-family:var(--font-mono); font-size:8px; letter-spacing:3px; color:var(--mid); margin-top:3px; }

        .sidebar-nav { flex:1; padding:20px 0; }
        .nav-item { display:flex; align-items:center; gap:12px; padding:12px 20px; font-family:var(--font-mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); cursor:pointer; transition:all var(--transition); border:none; background:none; width:100%; text-align:left; }
        .nav-item svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:1.5; flex-shrink:0; }
        .nav-item:hover { color:var(--light); background:rgba(255,255,255,0.03); }
        .nav-item.active { color:var(--tan); background:rgba(200,148,74,0.08); border-right:2px solid var(--tan); }

        .sidebar-footer { padding:16px 20px; border-top:1px solid var(--iron); }
        .logout-btn { display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); cursor:pointer; border:none; background:none; transition:color var(--transition); }
        .logout-btn:hover { color:var(--red); }
        .logout-btn svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:2; }

        .main { margin-left:220px; padding:32px; }

        .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; flex-wrap:wrap; gap:16px; }
        .topbar h1 { font-family:var(--font-display); font-size:36px; font-weight:900; color:var(--cream); }
        .refresh-btn { display:flex; align-items:center; gap:8px; background:var(--charcoal); border:1px solid var(--iron); color:var(--muted); padding:10px 18px; border-radius:2px; font-family:var(--font-mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all var(--transition); }
        .refresh-btn:hover { border-color:var(--tan); color:var(--tan); }
        .refresh-btn svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:2; }
        .refresh-btn.spinning svg { animation:spin 0.8s linear infinite; }

        .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:32px; }
        .kpi-card { background:var(--charcoal); border:1px solid var(--iron); border-radius:2px; padding:24px; position:relative; overflow:hidden; transition:border-color var(--transition); }
        .kpi-card:hover { border-color:rgba(200,148,74,0.3); }
        .kpi-card::before { content:''; position:absolute; top:0; left:0; width:3px; bottom:0; background:var(--tan); }
        .kpi-label { font-family:var(--font-mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
        .kpi-value { font-family:var(--font-display); font-size:44px; line-height:1; color:var(--tan); font-weight:900; }
        .kpi-sub { font-size:12px; color:var(--mid); margin-top:6px; }

        .data-tabs { display:flex; gap:2px; background:var(--charcoal); border-radius:2px; padding:3px; margin-bottom:24px; width:fit-content; border:1px solid var(--iron); }
        .data-tab { font-family:var(--font-mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; padding:10px 20px; border-radius:2px; cursor:pointer; border:none; background:none; color:var(--muted); transition:all var(--transition); }
        .data-tab.active { background:var(--tan); color:var(--black); }

        .filter-bar { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
        .filter-bar input { background:var(--charcoal); border:1px solid var(--iron); color:var(--cream); padding:10px 14px; border-radius:2px; font-family:var(--font-body); font-size:13px; min-width:220px; flex:1; transition:border-color var(--transition); }
        .filter-bar input:focus { outline:none; border-color:var(--tan); }
        .filter-bar input::placeholder { color:var(--mid); }
        .results-count { font-family:var(--font-mono); font-size:10px; letter-spacing:1px; color:var(--muted); margin-left:auto; }

        .table-wrap { background:var(--charcoal); border:1px solid var(--iron); border-radius:2px; overflow:hidden; }
        .table-header { padding:16px 24px; border-bottom:1px solid var(--iron); display:flex; align-items:center; justify-content:space-between; }
        .table-header h3 { font-family:var(--font-mono); font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--tan); }
        .export-btn { display:flex; align-items:center; gap:6px; background:transparent; border:1px solid var(--iron); color:var(--muted); padding:7px 14px; border-radius:2px; font-family:var(--font-mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all var(--transition); }
        .export-btn:hover { border-color:var(--tan); color:var(--tan); }
        .export-btn svg { width:12px; height:12px; stroke:currentColor; fill:none; stroke-width:2; }

        table { width:100%; border-collapse:collapse; }
        thead th { padding:13px 18px; font-family:var(--font-mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); text-align:left; border-bottom:1px solid var(--iron); background:var(--iron); }
        tbody tr { border-bottom:1px solid rgba(255,255,255,0.04); transition:background var(--transition); }
        tbody tr:last-child { border-bottom:none; }
        tbody tr:hover { background:rgba(255,255,255,0.03); }
        tbody td { padding:13px 18px; font-size:14px; color:var(--muted); vertical-align:middle; }
        .name-cell { font-weight:500; color:var(--cream) !important; }
        .phone-cell a { color:var(--tan); font-family:var(--font-mono); font-size:12px; text-decoration:none; }
        .date-cell { font-family:var(--font-mono); font-size:12px; color:var(--muted); }
        .msg-cell { max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px; }

        .badge { display:inline-block; padding:4px 10px; border-radius:2px; font-family:var(--font-mono); font-size:9px; letter-spacing:1px; text-transform:uppercase; }
        .badge-upcoming { background:rgba(45,90,39,0.2); color:var(--green-lt); }
        .badge-today { background:rgba(200,148,74,0.2); color:var(--tan); }
        .badge-past { background:rgba(90,90,80,0.2); color:var(--muted); }

        .action-btn { background:none; border:1px solid var(--iron); color:var(--muted); padding:5px 12px; border-radius:2px; cursor:pointer; font-family:var(--font-mono); font-size:9px; letter-spacing:1px; text-transform:uppercase; transition:all var(--transition); display:inline-flex; align-items:center; gap:5px; }
        .action-btn:hover { border-color:var(--tan); color:var(--tan); }

        .empty-state { padding:64px 24px; text-align:center; }
        .empty-state h4 { font-family:var(--font-display); font-size:22px; color:var(--muted); margin-bottom:8px; }
        .empty-state p { font-size:13px; color:var(--mid); }

        .loading { padding:64px 24px; text-align:center; }
        .loading-spinner { width:32px; height:32px; border:2px solid var(--iron); border-top-color:var(--tan); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
        .loading p { font-family:var(--font-mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }

        .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--charcoal); border:1px solid var(--iron); color:var(--cream); padding:14px 24px; border-radius:2px; font-size:13px; z-index:9999; transition:transform 0.3s ease; white-space:nowrap; }
        .toast.show { transform:translateX(-50%) translateY(0); }

        .pagination { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; border-top:1px solid var(--iron); }
        .pagination-info { font-family:var(--font-mono); font-size:10px; color:var(--muted); }
        .pagination-btns { display:flex; gap:6px; }
        .page-btn { background:var(--iron); border:1px solid rgba(255,255,255,0.06); color:var(--muted); padding:7px 13px; border-radius:2px; font-family:var(--font-mono); font-size:10px; cursor:pointer; transition:all var(--transition); }
        .page-btn:hover:not(:disabled) { border-color:var(--tan); color:var(--tan); }
        .page-btn:disabled { opacity:0.3; cursor:not-allowed; }
        .page-btn.active { background:var(--tan); border-color:var(--tan); color:var(--black); }

        @media (max-width:900px) {
            .sidebar { width:60px; }
            .sidebar-logo-main, .sidebar-logo-sub, .nav-item span, .sidebar-footer { display:none; }
            .nav-item { justify-content:center; padding:14px; }
            .main { margin-left:60px; padding:20px; }
            .kpi-grid { grid-template-columns:repeat(2,1fr); }
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <div class="login-logo">BULL <span>&</span> BUSH</div>
            <h2>Admin Login</h2>
            <p>Enter your password to access the dashboard.</p>
            <div class="login-field">
                <label>Password</label>
                <input type="password" id="passwordInput" placeholder="Admin password" onkeydown="if(event.key==='Enter') login()">
            </div>
            <button class="login-btn" onclick="login()">Access Dashboard</button>
            <div class="login-error" id="loginError">Incorrect password. Please try again.</div>
        </div>
    </div>

    <div id="dashboard">
        <div class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-main">BULL <span>&</span> BUSH</div>
                <div class="sidebar-logo-sub">Admin Panel</div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" id="navReservations" onclick="showView('reservations')">
                    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <span>Reservations</span>
                </button>
                <button class="nav-item" id="navEnquiries" onclick="showView('enquiries')">
                    <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <span>Enquiries</span>
                </button>
                <button class="nav-item" onclick="window.open('index.html','_blank')">
                    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                    <span>View Site</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                    <span>Logout</span>
                </button>
            </div>
        </div>

        <main class="main">
            <div class="topbar">
                <h1 id="viewTitle">Reservations</h1>
                <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
                    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                    Refresh
                </button>
            </div>

            <div class="kpi-grid">
                <div class="kpi-card"><div class="kpi-label" id="k1label">Total Bookings</div><div class="kpi-value" id="kpiTotal">—</div><div class="kpi-sub">All time</div></div>
                <div class="kpi-card"><div class="kpi-label">This Month</div><div class="kpi-value" id="kpiMonth">—</div><div class="kpi-sub" id="kpiMonthLabel">—</div></div>
                <div class="kpi-card"><div class="kpi-label">This Week</div><div class="kpi-value" id="kpiWeek">—</div><div class="kpi-sub">Last 7 days</div></div>
                <div class="kpi-card"><div class="kpi-label" id="k4label">Today</div><div class="kpi-value" id="kpiToday">—</div><div class="kpi-sub" id="kpiTodaySub">Bookings</div></div>
            </div>

            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="Search by name or phone..." oninput="filterData()">
                <span class="results-count" id="resultsCount"></span>
            </div>

            <div class="table-wrap">
                <div class="table-header">
                    <h3 id="tableTitle">// Reservation Requests</h3>
                    <button class="export-btn" onclick="exportCSV()">
                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                        Export CSV
                    </button>
                </div>
                <div id="tableBody"><div class="loading"><div class="loading-spinner"></div><p>Loading data...</p></div></div>
                <div class="pagination" id="pagination" style="display:none">
                    <span class="pagination-info" id="paginationInfo"></span>
                    <div class="pagination-btns" id="paginationBtns"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        'use strict';

        const SUPABASE_URL  = 'https://pkolzgjtootsjhbvwtcf.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrb2x6Z2p0b290c2poYnZ3dGNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzczMjMsImV4cCI6MjA5MDE1MzMyM30.blJvipdwJDTzfVDcceGFvk6EYWZNJDaxRnhKeM9EgyY';
        const ADMIN_PASSWORD = 'BullBushAdmin2026'; // ← Change this

        const PER_PAGE = 15;
        let currentView = 'reservations';
        let allData = [], filtered = [], currentPage = 1;

        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON);

        function login() {
            const pwd = document.getElementById('passwordInput').value;
            if (pwd === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                sessionStorage.setItem('bb_auth', '1');
                loadData();
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }

        function logout() {
            sessionStorage.removeItem('bb_auth');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }

        if (sessionStorage.getItem('bb_auth')) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadData();
        }

        function showView(view) {
            currentView = view;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav' + view.charAt(0).toUpperCase() + view.slice(1)).classList.add('active');
            document.getElementById('viewTitle').textContent = view === 'reservations' ? 'Reservations' : 'Enquiries';
            document.getElementById('tableTitle').textContent = view === 'reservations' ? '// Reservation Requests' : '// Customer Enquiries';
            document.getElementById('k1label').textContent = view === 'reservations' ? 'Total Bookings' : 'Total Enquiries';
            document.getElementById('k4label').textContent = view === 'reservations' ? 'Today' : 'This Week';
            document.getElementById('searchInput').value = '';
            loadData();
        }

        async function loadData() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            document.getElementById('tableBody').innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Loading data...</p></div>';

            const table = currentView === 'reservations' ? 'bullandbush_reservations' : 'bullandbush_enquiries';
            const { data, error } = await db.from(table).select('*').order('created_at', { ascending: false });

            btn.classList.remove('spinning');
            if (error) { showToast('Error: ' + error.message); return; }

            allData = data || [];
            updateKPIs();
            filterData();
        }

        function updateKPIs() {
            const now = new Date();
            const todayStr = now.toISOString().slice(0, 10);
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
            const weekStart  = new Date(now - 7 * 86400000);

            const thisMonth = allData.filter(d => new Date(d.created_at) >= monthStart);
            const thisWeek  = allData.filter(d => new Date(d.created_at) >= weekStart);
            const today     = currentView === 'reservations' ? allData.filter(d => d.date === todayStr) : thisWeek;

            document.getElementById('kpiTotal').textContent = allData.length;
            document.getElementById('kpiMonth').textContent = thisMonth.length;
            document.getElementById('kpiMonthLabel').textContent = now.toLocaleString('default', { month: 'long' });
            document.getElementById('kpiWeek').textContent = thisWeek.length;
            document.getElementById('kpiToday').textContent = today.length;
            document.getElementById('kpiTodaySub').textContent = currentView === 'reservations' ? 'Reservations today' : 'This week';
        }

        function filterData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            filtered = allData.filter(d =>
                !search ||
                (d.name  && d.name.toLowerCase().includes(search)) ||
                (d.phone && d.phone.toLowerCase().includes(search)) ||
                (d.email && d.email.toLowerCase().includes(search))
            );
            document.getElementById('resultsCount').textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;
            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const start = (currentPage - 1) * PER_PAGE;
            const page  = filtered.slice(start, start + PER_PAGE);
            const container = document.getElementById('tableBody');

            if (!filtered.length) {
                container.innerHTML = `<div class="empty-state"><h4>No Records Found</h4><p>Try adjusting your search.</p></div>`;
                document.getElementById('pagination').style.display = 'none';
                return;
            }

            const rows = currentView === 'reservations' ? renderResRows(page) : renderEnqRows(page);
            const headers = currentView === 'reservations'
                ? '<th>Name</th><th>Phone</th><th>Date</th><th>Time</th><th>Party</th><th>Notes</th><th>Booked</th><th>Action</th>'
                : '<th>Name</th><th>Phone</th><th>Email</th><th>Message</th><th>Date</th><th>Action</th>';

            container.innerHTML = `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
            renderPagination();
        }

        function renderResRows(page) {
            const today = new Date().toISOString().slice(0,10);
            return page.map(r => {
                const booked = new Date(r.created_at).toLocaleDateString('en-GB', { day:'2-digit', month:'short' });
                const isToday = r.date === today;
                const isPast  = r.date < today;
                const badgeCls = isToday ? 'badge-today' : isPast ? 'badge-past' : 'badge-upcoming';
                const waMsg = encodeURIComponent(`Hi ${r.name}, this is Bull & Bush confirming your reservation on ${r.date} at ${r.time} for ${r.party_size} guests. Cheers!`);
                return `<tr>
                    <td class="name-cell">${esc(r.name||'—')}</td>
                    <td class="phone-cell"><a href="tel:${esc(r.phone)}">${esc(r.phone||'—')}</a></td>
                    <td><span class="badge ${badgeCls}">${esc(r.date||'—')}</span></td>
                    <td class="date-cell">${esc(r.time||'—')}</td>
                    <td style="font-family:var(--font-mono);font-size:12px;">${esc(r.party_size||'—')}</td>
                    <td class="msg-cell" title="${esc(r.notes||'')}">${esc(r.notes||'—')}</td>
                    <td class="date-cell">${booked}</td>
                    <td><button class="action-btn" onclick="window.open('https://wa.me/26739757070?text=${waMsg}','_blank')">Reply</button></td>
                </tr>`;
            }).join('');
        }

        function renderEnqRows(page) {
            return page.map(e => {
                const date = new Date(e.created_at).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
                const waMsg = encodeURIComponent(`Hi ${e.name}, this is Bull & Bush following up on your enquiry.`);
                return `<tr>
                    <td class="name-cell">${esc(e.name||'—')}</td>
                    <td class="phone-cell"><a href="tel:${esc(e.phone)}">${esc(e.phone||'—')}</a></td>
                    <td style="font-size:13px;color:var(--light)">${esc(e.email||'—')}</td>
                    <td class="msg-cell" title="${esc(e.message||'')}">${esc(e.message||'—')}</td>
                    <td class="date-cell">${date}</td>
                    <td><button class="action-btn" onclick="window.open('https://wa.me/26739757070?text=${waMsg}','_blank')">Reply</button></td>
                </tr>`;
            }).join('');
        }

        function renderPagination() {
            const totalPages = Math.ceil(filtered.length / PER_PAGE);
            const pag = document.getElementById('pagination');
            if (totalPages <= 1) { pag.style.display = 'none'; return; }
            pag.style.display = 'flex';

            const start = (currentPage - 1) * PER_PAGE + 1;
            const end   = Math.min(currentPage * PER_PAGE, filtered.length);
            document.getElementById('paginationInfo').textContent = `Showing ${start}–${end} of ${filtered.length}`;

            let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Prev</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (totalPages <= 7 || i===1 || i===totalPages || Math.abs(i-currentPage)<=1)
                    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
                else if (Math.abs(i-currentPage)===2)
                    html += `<button class="page-btn" disabled>…</button>`;
            }
            html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next →</button>`;
            document.getElementById('paginationBtns').innerHTML = html;
        }

        function goPage(n) {
            const total = Math.ceil(filtered.length / PER_PAGE);
            if (n < 1 || n > total) return;
            currentPage = n;
            renderTable();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function exportCSV() {
            if (!filtered.length) { showToast('No data to export'); return; }
            let headers, rows;
            if (currentView === 'reservations') {
                headers = ['Name','Phone','Email','Date','Time','Party Size','Notes','Booked At'];
                rows = filtered.map(r => [r.name,r.phone,r.email,r.date,r.time,r.party_size,r.notes,new Date(r.created_at).toLocaleDateString('en-GB')]);
            } else {
                headers = ['Name','Phone','Email','Message','Date'];
                rows = filtered.map(e => [e.name,e.phone,e.email,(e.message||'').replace(/\n/g,' '),new Date(e.created_at).toLocaleDateString('en-GB')]);
            }
            const csv = [headers.join(','), ...rows.map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(','))].join('\n');
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = `bullandbush_${currentView}_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            showToast('CSV exported!');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function esc(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        /* Real-time */
        db.channel('bb_reservations')
            .on('postgres_changes', { event:'INSERT', schema:'public', table:'bullandbush_reservations' }, payload => {
                if (currentView === 'reservations') { allData.unshift(payload.new); updateKPIs(); filterData(); }
                showToast('🍺 New reservation from ' + payload.new.name);
            }).subscribe();

        db.channel('bb_enquiries')
            .on('postgres_changes', { event:'INSERT', schema:'public', table:'bullandbush_enquiries' }, payload => {
                if (currentView === 'enquiries') { allData.unshift(payload.new); updateKPIs(); filterData(); }
                showToast('✉️ New enquiry from ' + payload.new.name);
            }).subscribe();
    </script>
</body>
</html>
